<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Covoiturage Dahira - Temps Réel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/module.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a472a;
            --accent: #f39c12;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #2d7a4a 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2000;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
        }

        .login-card h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .login-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .login-form {
            display: none;
        }

        .login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #2d7a4a;
        }

        .app-screen {
            display: none;
        }

        .app-screen.active {
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .user-info {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logout-btn {
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .form-section h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #2d7a4a;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-secondary {
            background: var(--accent);
            color: white;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            border-left: 4px solid var(--primary);
        }

        .card h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .card-info {
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .card-info strong {
            display: inline-block;
            min-width: 80px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- CONNEXION -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>🚗 Covoiturage</h1>
            
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchLoginTab('cond')">👨‍🚗 Conducteur</button>
                <button class="login-tab" onclick="switchLoginTab('pass')">👥 Passager</button>
            </div>

            <form class="login-form active" id="formCond" onsubmit="connexionConducteur(event)">
                <div class="form-group">
                    <label>Nom:</label>
                    <input type="text" id="nomCond" required placeholder="Ahmed Diallo">
                </div>
                <div class="form-group">
                    <label>Téléphone:</label>
                    <input type="tel" id="telCond" required placeholder="+1-819-123-4567">
                </div>
                <button type="submit" class="btn-login">Continuer</button>
            </form>

            <form class="login-form" id="formPass" onsubmit="connexionPassager(event)">
                <div class="form-group">
                    <label>Nom:</label>
                    <input type="text" id="nomPass" required placeholder="Fatou Ba">
                </div>
                <div class="form-group">
                    <label>Téléphone:</label>
                    <input type="tel" id="telPass" required placeholder="+1-819-456-7890">
                </div>
                <button type="submit" class="btn-login">Continuer</button>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div class="app-screen" id="appScreen">
        <div class="container">
            <div class="header">
                <h1>🚗 Covoiturage Dahira ⚡</h1>
            </div>

            <div class="user-info">
                <div>
                    <strong id="userType"></strong> - <span id="userName"></span>
                </div>
                <button class="logout-btn" onclick="deconnexion()">Déconnexion</button>
            </div>

            <!-- CONDUCTEUR -->
            <div id="portalCond" style="display: none;">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('addTrajet')">+ Ajouter</button>
                    <button class="tab-btn" onclick="switchTab('mesTrajets')">Mes trajets</button>
                    <button class="tab-btn" onclick="switchTab('mesClients')">Mes clients</button>
                </div>

                <div id="addTrajet" class="content active">
                    <div class="form-section">
                        <h2>Ajouter un trajet</h2>
                        <form onsubmit="ajouterTrajet(event)">
                            <div class="form-group">
                                <label>Lieu de départ:</label>
                                <input type="text" id="lieu" required placeholder="Parc Cormier">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Nombre de places:</label>
                                    <input type="number" id="sieges" min="1" max="7" required value="3">
                                </div>
                                <div class="form-group">
                                    <label>Date:</label>
                                    <input type="date" id="date" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Heure:</label>
                                <input type="time" id="heure" required>
                            </div>
                            <div class="form-group">
                                <label>Notes:</label>
                                <textarea id="notes" rows="3" placeholder="Musique, arrêts..."></textarea>
                            </div>
                            <button type="submit" class="btn-primary">Ajouter</button>
                        </form>
                    </div>
                </div>

                <div id="mesTrajets" class="content">
                    <h2>Mes trajets</h2>
                    <div id="mesTrajetsContainer"></div>
                </div>

                <div id="mesClients" class="content">
                    <h2>Mes clients</h2>
                    <div id="mesClientsContainer"></div>
                </div>
            </div>

            <!-- PASSAGER -->
            <div id="portalPass" style="display: none;">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('trajets')">Trajets dispo</button>
                    <button class="tab-btn" onclick="switchTab('mesResa')">Mes réservations</button>
                </div>

                <div id="trajets" class="content active">
                    <h2>Trajets disponibles</h2>
                    <div id="trajetsContainer"></div>
                </div>

                <div id="mesResa" class="content">
                    <h2>Mes réservations</h2>
                    <div id="resaContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/+esm'

        const supabaseUrl = 'https://wgtaszmjulwqyrgaofgg.supabase.co';
        const supabaseKey = 'sb_publishable_ReMnh16QWWELpyly7nHi6A_S75rq1hw';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let user = null;
        let trajets = [];
        let reservations = [];

        window.switchLoginTab = function(tab) {
            document.querySelectorAll('.login-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            document.querySelector(`[onclick="switchLoginTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab === 'cond' ? 'formCond' : 'formPass').classList.add('active');
        }

        window.connexionConducteur = function(e) {
            e.preventDefault();
            user = {
                type: 'conducteur',
                nom: document.getElementById('nomCond').value,
                tel: document.getElementById('telCond').value
            };
            afficherApp();
        }

        window.connexionPassager = function(e) {
            e.preventDefault();
            user = {
                type: 'passager',
                nom: document.getElementById('nomPass').value,
                tel: document.getElementById('telPass').value
            };
            afficherApp();
        }

        function afficherApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.add('active');
            document.getElementById('userType').textContent = user.type === 'conducteur' ? '👨‍🚗 CONDUCTEUR' : '👥 PASSAGER';
            document.getElementById('userName').textContent = user.nom;

            if (user.type === 'conducteur') {
                document.getElementById('portalCond').style.display = 'block';
                document.getElementById('portalPass').style.display = 'none';
            } else {
                document.getElementById('portalCond').style.display = 'none';
                document.getElementById('portalPass').style.display = 'block';
            }

            chargerDonnees();
            ecouterChangements();
        }

        async function chargerDonnees() {
            const { data: trajetsData } = await supabase.from('trajets').select('*');
            const { data: resData } = await supabase.from('reservations').select('*');
            
            trajets = trajetsData || [];
            reservations = resData || [];
            
            rafraichir();
        }

        function ecouterChangements() {
            supabase.channel('trajets-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'trajets' }, payload => {
                    chargerDonnees();
                })
                .subscribe();

            supabase.channel('reservations-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'reservations' }, payload => {
                    chargerDonnees();
                })
                .subscribe();
        }

        function rafraichir() {
            if (user && user.type === 'conducteur') {
                afficherMesTrajets();
                afficherMesClients();
            } else if (user) {
                afficherTrajets();
                afficherMesResa();
            }
        }

        window.deconnexion = function() {
            if (confirm('Déconnexion?')) {
                user = null;
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.remove('active');
            }
        }

        window.switchTab = function(tab) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
        }

        window.ajouterTrajet = async function(e) {
            e.preventDefault();
            
            const { error } = await supabase.from('trajets').insert([{
                conducteur: user.nom,
                tel: user.tel,
                lieu: document.getElementById('lieu').value,
                sieges: parseInt(document.getElementById('sieges').value),
                siegesDisponibles: parseInt(document.getElementById('sieges').value),
                date: document.getElementById('date').value,
                heure: document.getElementById('heure').value,
                notes: document.getElementById('notes').value
            }]);

            if (error) {
                alert('Erreur: ' + error.message);
            } else {
                alert('✅ Trajet ajouté!');
                e.target.reset();
                switchTab('mesTrajets');
                chargerDonnees();
            }
        }

        function afficherMesTrajets() {
            const miens = trajets.filter(t => t.conducteur === user.nom);
            const html = miens.length === 0 ? 
                '<div class="empty-state">Aucun trajet</div>' :
                '<div class="card-grid">' + miens.map(t => `
                    <div class="card">
                        <h3>${t.lieu}</h3>
                        <div class="card-info"><strong>Date:</strong> ${t.date}</div>
                        <div class="card-info"><strong>Heure:</strong> ${t.heure}</div>
                        <div class="card-info"><strong>Places:</strong> ${t.siegesDisponibles}/${t.sieges}</div>
                        <button class="btn-danger" onclick="supprimerTrajet(${t.id})">Supprimer</button>
                    </div>
                `).join('') + '</div>';
            document.getElementById('mesTrajetsContainer').innerHTML = html;
        }

        function afficherMesClients() {
            const miens = trajets.filter(t => t.conducteur === user.nom);
            const mesReservations = reservations.filter(r => miens.some(t => t.id === r.trajetId));
            const html = mesReservations.length === 0 ?
                '<div class="empty-state">Aucune réservation</div>' :
                mesReservations.map(r => `
                    <div class="card">
                        <h3>${r.nomPassager}</h3>
                        <div class="card-info"><strong>Personnes:</strong> ${r.personnes}</div>
                        <div class="card-info"><strong>Tél:</strong> ${r.tel}</div>
                    </div>
                `).join('');
            document.getElementById('mesClientsContainer').innerHTML = html;
        }

        function afficherTrajets() {
            const dispo = trajets.filter(t => t.siegesDisponibles > 0);
            const html = dispo.length === 0 ?
                '<div class="empty-state">Aucun trajet disponible</div>' :
                '<div class="card-grid">' + dispo.map(t => `
                    <div class="card">
                        <h3>${t.lieu}</h3>
                        <div class="card-info"><strong>Conducteur:</strong> ${t.conducteur}</div>
                        <div class="card-info"><strong>Date:</strong> ${t.date}</div>
                        <div class="card-info"><strong>Heure:</strong> ${t.heure}</div>
                        <div class="card-info"><strong>Places:</strong> ${t.siegesDisponibles}</div>
                        <div class="card-info"><strong>Tel:</strong> ${t.tel}</div>
                        <button class="btn-secondary" onclick="ouvrirResa(${t.id})">Réserver</button>
                    </div>
                `).join('') + '</div>';
            document.getElementById('trajetsContainer').innerHTML = html;
        }

        function afficherMesResa() {
            const mesReservations = reservations.filter(r => r.nomPassager === user.nom);
            const html = mesReservations.length === 0 ?
                '<div class="empty-state">Aucune réservation</div>' :
                mesReservations.map(r => {
                    const trajet = trajets.find(t => t.id === r.trajetId);
                    if (!trajet) return '';
                    return `
                        <div class="card">
                            <h3>${trajet.lieu}</h3>
                            <div class="card-info"><strong>Conducteur:</strong> ${trajet.conducteur}</div>
                            <div class="card-info"><strong>Date:</strong> ${trajet.date}</div>
                            <div class="card-info"><strong>Personnes:</strong> ${r.personnes}</div>
                            <button class="btn-danger" onclick="annulerResa(${r.id})">Annuler</button>
                        </div>
                    `;
                }).join('');
            document.getElementById('resaContainer').innerHTML = html;
        }

        window.ouvrirResa = async function(trajetId) {
            const personnes = prompt('Combien de personnes?', '1');
            if (!personnes) return;
            
            const trajet = trajets.find(t => t.id === trajetId);
            if (parseInt(personnes) > trajet.siegesDisponibles) {
                alert('❌ Pas assez de places!');
                return;
            }

            const { error: resError } = await supabase.from('reservations').insert([{
                trajetId,
                nomPassager: user.nom,
                tel: user.tel,
                personnes: parseInt(personnes)
            }]);

            if (resError) {
                alert('Erreur: ' + resError.message);
                return;
            }

            const nouvellePlaces = trajet.siegesDisponibles - parseInt(personnes);
            const { error: updateError } = await supabase.from('trajets').update({ 
                siegesDisponibles: nouvellePlaces 
            }).eq('id', trajetId);

            if (updateError) {
                alert('Erreur: ' + updateError.message);
            } else {
                alert('✅ Réservation confirmée!');
                chargerDonnees();
            }
        }

        window.supprimerTrajet = async function(id) {
            if (confirm('Supprimer?')) {
                await supabase.from('reservations').delete().eq('trajetId', id);
                await supabase.from('trajets').delete().eq('id', id);
                chargerDonnees();
            }
        }

        window.annulerResa = async function(id) {
            if (confirm('Annuler?')) {
                const resa = reservations.find(r => r.id === id);
                const trajet = trajets.find(t => t.id === resa.trajetId);
                
                await supabase.from('trajets').update({ 
                    siegesDisponibles: trajet.siegesDisponibles + resa.personnes 
                }).eq('id', resa.trajetId);
                
                await supabase.from('reservations').delete().eq('id', id);
                chargerDonnees();
            }
        }
    </script>
</body>
</html>
